services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - upload_data:/tmp/uploads
    depends_on:
      - redis

  celery-worker:
    build: ./backend
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    volumes:
      - upload_data:/tmp/uploads
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  upload_data:
  redis_data:
